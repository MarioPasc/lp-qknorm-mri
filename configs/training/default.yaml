lr: 3.0e-4
weight_decay: 1.0e-5
betas: [0.9, 0.999]
max_epochs: 100
patience: 15
eta_min: 1.0e-6
batch_size: 16
accumulate_grad_batches: 1
precision: "bf16-mixed"
gradient_clip_val: 1.0
num_workers: 8
seed: 20260216
gradient_log_every_n_steps: 50
bce_weight: 0.5
dice_weight: 0.5
threshold: 0.5

# Replace non-finite training losses with a zero leaf tensor so the
# optimiser step is a no-op instead of poisoning every parameter with NaN.
# Set false to restore the old behaviour (fail fast on NaN).
skip_on_nonfinite_loss: true
