# Picasso-specific path overrides for the Lp-QKNorm sweep.
#
# Consumed by `scripts/slurm/launch.sh`, which parses these values and
# forwards them as Hydra CLI overrides to `lpqknorm-train` on each SLURM
# array task.  Keep this file free of host-local assumptions other than
# the Picasso filesystem layout documented below.
#
# Filesystem layout on Picasso (tic_163_uma / user: mpascual):
#   $HOME             = /mnt/home/users/tic_163_uma/mpascual
#   $FSCRATCH         = /mnt/home/users/tic_163_uma/mpascual/fscratch
#   $EXECS            = /mnt/home/users/tic_163_uma/mpascual/execs
#
# Absolute paths are used throughout because SLURM workers inherit only
# the exported environment and the compute-node filesystem is shared.

paths:
  # Repository checkout (editable install target)
  repo_src: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/lp-qknorm-mri

  # Standardized HDF5 produced by `lpqknorm-preprocess --fixed-test-patients 100`
  h5_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/lpqknorm/brats_men.h5

  # Run-directory root — one subtree per experiment, per p, per fold
  run_dir: /mnt/home/users/tic_163_uma/mpascual/execs/lpqknorm_mri/p_sweep_v1

  # Conda environment holding the editable install
  conda_env: lpqknorm

experiment:
  name: p_sweep_v1

sweep:
  # Sweep axes — mirrored in scripts/slurm/launch.sh.  Order is fixed:
  # SLURM_ARRAY_TASK_ID = p_idx * n_folds + fold_idx
  #
  # 6 p-values × 3 folds = 18 array tasks (one GPU each).
  # p=2.0 is the primary baseline (Henry et al. QKNorm); p∈{1, 1.5} probes
  # the sub-Euclidean regime; p∈{2.5, 3, 4} probes the super-Euclidean
  # regime predicted to exhibit an interior maximum in small-lesion recall.
  p_values: ["1.0", "1.5", "2.0", "2.5", "3.0", "4.0"]
  folds: [0, 1, 2]

training:
  # Picasso compute-node defaults — override the lab-workstation values.
  # B=4 + accumulate=4 keeps the effective optimizer batch at 16 (matches the
  # pre-OOM value) while halving the peak activation footprint.  bf16-mixed
  # stays enabled; the fp32 islands around _lp_normalize and CompoundSegLoss
  # keep the numerics stable for non-integer p without losing throughput.
  num_workers: 8
  precision: bf16-mixed
  batch_size: 4
  accumulate_grad_batches: 4
  seed: 20260216

model:
  # Activation checkpointing is mandatory on the 40 GB A100 at 224^2 once
  # the attention-capture leak is removed.  Roughly 30-40 % activation
  # memory reduction for ~20 % wall-clock cost; confirmed safe for the
  # probe pipeline because probes run under torch.no_grad() where no
  # re-forward pass is triggered.
  use_checkpoint: true

slurm:
  # Resource envelope per array task (one GPU, one p-fold pair).
  # Picasso's default partition is used when `partition` is empty — the
  # MenGrowth reference workflow confirmed that passing `--partition=gpu`
  # is rejected on this cluster.  Node selection is done via `constraint`
  # (dgx = A100 nodes with CUDA-capable GPUs).
  partition: ""
  gres: "gpu:1"
  cpus_per_task: 16
  mem: 64G
  time: "1-00:00:00"
  constraint: "dgx"
